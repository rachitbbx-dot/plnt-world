<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About | VK Nursery</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}

body{
  min-height:100vh;
  background:url('bg.webp') center/cover no-repeat;
  color:white;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
}

.topbar{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 16px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.back{color:#c7f9cc;cursor:pointer;}

.title{font-weight:600;color:#c7f9cc;}

.container{
  max-width:700px;
  margin:auto;
  padding:18px;
}

.card{
  margin-top:20px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:18px;
  backdrop-filter:blur(14px);
  padding:20px;
}

p{
  font-size:13px;
  opacity:0.9;
  line-height:1.6;
  margin:12px 0;
}

.icon{
  display:flex;
  gap:10px;
  margin:10px 0;
  font-size:13px;
}

.icon i{color:#4ade80;}

</style>
</head>

<body>

<div class="topbar">
  <div class="back" onclick="history.back()">
    <i class="fa-solid fa-arrow-left"></i> Back
  </div>
  <div class="title">About</div>
  <div></div>
</div>

<div class="container">
  <div class="card">

    <p>
      VK Flower Nursery focuses on real plant survival, not just selling plants.
      Every plant is grown under real Kangra climate conditions.
    </p>

    <div class="icon"><i class="fa-solid fa-seedling"></i> Nursery-grown plants</div>
    <div class="icon"><i class="fa-solid fa-hand-holding-heart"></i> Care guidance</div>
    <div class="icon"><i class="fa-solid fa-truck"></i> Safe handling</div>

  </div>
</div>

</body>
</html>
