<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacy - VK Flower Nursery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  background:url('bg.webp') no-repeat center/cover;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  color:#e8f5e9;
  position:relative;
}

body::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,40,20,0.6);
  backdrop-filter:blur(2px);
}

.card{
  position:relative;
  z-index:1;
  max-width:420px;
  width:100%;
  padding:26px;
  border-radius:22px;
  backdrop-filter:blur(18px);
  background:rgba(0,80,40,0.25);
}

h1{margin-bottom:10px;}

p{
  font-size:0.85rem;
  line-height:1.6;
  opacity:0.9;
  margin-bottom:10px;
}

.back-btn{
  display:inline-block;
  margin-top:18px;
  padding:10px 14px;
  border-radius:10px;
  background:rgba(255,255,255,0.08);
  color:#c8e6c9;
  text-decoration:none;
  font-size:0.85rem;
}
</style>
</head>

<body>

<div class="card">
  <h1>Privacy Policy</h1>

  <p>No personal data is collected at this stage.</p>
  <p>Future updates may include forms where minimal data will be used responsibly.</p>
  <p>No user data is sold or shared.</p>

  <a href="javascript:history.back()" class="back-btn">← Back</a>
</div>

</body>
</html>
