<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="VK Flower Nursery - 30+ years of trusted plant care and guidance in Kangra.">
<title>VK Flower Nursery</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Outfit',sans-serif;
}

/* SAME BASE AS GALLERY */
body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:#fff;
  background:url('bg.webp') center/cover no-repeat;
  position:relative;
}

/* EXACT SAME OVERLAY SYSTEM AS GALLERY */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:0;
}

/* CARD = SAME SURFACE SYSTEM */
.glass-card{
  position:relative;
  z-index:2;
  width:100%;
  max-width:440px;
  padding:26px;
  border-radius:16px;

  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);

  backdrop-filter:blur(14px);
  box-shadow:0 10px 35px rgba(0,0,0,0.45);

  text-align:center;
}

/* BRAND */
.brand{
  font-size:2rem;
  font-weight:600;
  letter-spacing:0.2px;
}

.meta{
  font-size:0.85rem;
  opacity:0.75;
  margin-top:6px;
}

/* DIVIDER */
.divider{
  height:1px;
  background:rgba(255,255,255,0.12);
  margin:18px 0;
}

/* TEXT */
.about{
  font-size:0.92rem;
  line-height:1.6;
  opacity:0.9;
  margin-bottom:18px;
}

/* BUTTONS = SAME AS GALLERY ACCENT SYSTEM */
.btn{
  display:block;
  width:100%;
  padding:13px;
  margin-bottom:12px;
  border-radius:12px;
  text-decoration:none;
  font-size:0.95rem;
  font-weight:500;
  transition:0.2s ease;
}

/* PRIMARY (MATCHES ACCENT #4ade80) */
.btn-primary{
  background:rgba(74,222,128,0.12);
  border:1px solid rgba(74,222,128,0.35);
  color:#c7f9cc;
}

.btn-primary:hover{
  transform:translateY(-2px);
  background:rgba(74,222,128,0.18);
}

/* DISABLED */
.btn-disabled{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.35);
  pointer-events:none;
}

/* BADGES */
.badges{
  margin-top:14px;
  font-size:0.8rem;
  opacity:0.75;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
}

/* FOOTER */
.footer{
  position:absolute;
  bottom:12px;
  width:100%;
  text-align:center;
  font-size:0.7rem;
  opacity:0.6;
  z-index:2;
}

.footer a{
  color:#c7f9cc;
  text-decoration:none;
  margin:0 6px;
}

.footer a:hover{
  opacity:1;
}

</style>

</head>

<body>

<div class="glass-card">

  <div class="brand">VK Flower Nursery</div>
  <div class="meta">Gaggal, Kangra • 30+ Years of Trust</div>

  <div class="divider"></div>

  <div class="about">
    Practical plant care focused nursery — designed for long-term survival and real growth, not just purchase-day appearance.
  </div>

  <a href="gallery.html" class="btn btn-primary">
    Plant Care Guide
  </a>

  <div class="btn btn-disabled">
    Explore Plants (Coming Soon)
  </div>

  <div class="badges">
    <span>🌿 Care-first</span>
    <span>🪴 Nursery-grown</span>
    <span>🚚 Safe handling</span>
  </div>

</div>

<div class="footer">
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
  <a href="privacy.html">Privacy</a>
  <a href="terms.html">Terms</a>
</div>

</body>
</html>
